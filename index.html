<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山科歴史デジタルアーカイブ</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #8b0000; --bg: #f8f5f0; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Shippori Mincho', serif; background: var(--bg); overflow: hidden; }
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 5000; border-bottom: 1px solid rgba(0,0,0,0.05); box-sizing: border-box; }
        .page { display: none; width: 100%; height: 100vh; padding-top: 60px; box-sizing: border-box; }
        .active { display: block; }
        #map { width: 100%; height: 100%; background: #ddd; }
        .map-ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 420px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; z-index: 6000; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div style="text-align:center; background:white; padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
        <h2 style="letter-spacing:4px;">山科の記憶</h2>
        <button onclick="handleAuth()" style="margin-top:20px; padding:10px 30px; border-radius:20px; border:none; background:#222; color:white; cursor:pointer;">アーカイブを開く</button>
    </div>
</div>

<header id="main-header" style="display:none;">
    <div style="font-weight:bold; color:var(--accent); cursor:pointer;" onclick="showPage('home')">山科歴史アーカイブ</div>
    <nav>
        <a href="javascript:showPage('archive')" style="margin-left:15px; color:#222; text-decoration:none;"><i class="fa-solid fa-list"></i></a>
        <a href="javascript:showPage('map')" style="margin-left:15px; color:#222; text-decoration:none;"><i class="fa-solid fa-map"></i></a>
    </nav>
</header>

<div id="home-page" class="page active">
    <div style="padding:100px 20px; text-align:center;">
        <h1>温故知新</h1>
        <p>Googleドライブ連携による地図配信モード</p>
        <button onclick="showPage('map')" style="padding:15px 40px; background:var(--accent); color:white; border:none; border-radius:30px; cursor:pointer; margin-top:20px;">地図を開始</button>
    </div>
</div>

<div id="archive-page" class="page">
    <div id="archive-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px; padding:20px;"></div>
</div>

<div id="map-page" class="page" style="padding-top:0;">
    <div id="map"></div>
    <div class="map-ui">
        <b id="year-display" style="color:var(--accent);">明治18年 (1885)</b><br>
        <input type="range" id="time-slider" min="0" max="2" step="1" value="0">
        <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#888;">
            <span>明治</span><span>大正</span><span>現代</span>
        </div>
    </div>
</div>

<script>
    const SECRET = "yamashina_rekishi";
    const SHEET_ID = '1JNOhsD4k1GzEVnUqS2ftN8ytw2GbraXjEFysoxwVl_A';
    
    // Googleドライブ直リンク形式に変換
    const URL_1885 = "https://drive.google.com/uc?export=download&id=1e9-e5GOpg1jFh_Xl27Oq1-h-GjOHm8o1";
    const URL_1922 = "https://drive.google.com/uc?export=download&id=1wb7eexQH5PssPnSpcimYi4u3p8l5Tl0k";

    let archiveData = [];
    let map;
    let protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    function handleAuth() {
        if (prompt("合言葉を入力してください") === SECRET) {
            localStorage.setItem("yamashina_drive_v1", "true");
            location.reload();
        }
    }

    window.onload = function() {
        if (localStorage.getItem("yamashina_drive_v1") === "true") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            initApp();
        }
    };

    async function initApp() {
        await loadSpreadsheet();
        initMap();
    }

    async function loadSpreadsheet() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            archiveData = rows.map((row, idx) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                return { id: idx, drive_id: cols[1], title: cols[4], coords: cols[6], year: cols[7] };
            }).filter(d => d.drive_id);
            renderArchive();
        } catch (e) { console.error(e); }
    }

    function renderArchive() {
        document.getElementById('archive-list').innerHTML = archiveData.map(item => `
            <div style="background:white; border-radius:12px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                <img src="https://drive.google.com/thumbnail?id=${item.drive_id}&sz=w400" style="width:100%; height:180px; object-fit:cover;">
                <div style="padding:15px;"><b>${item.title}</b><br><small>${item.year}</small></div>
            </div>
        `).join('');
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById(p + '-page').classList.add('active');
        if(p === 'map' && map) setTimeout(() => map.resize(), 200);
    }

    function initMap() {
        map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    "osm": { type: "raster", tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"], tileSize: 256 },
                    "m1885": { type: "raster", url: "pmtiles://" + URL_1885, tileSize: 256 },
                    "t1922": { type: "raster", url: "pmtiles://" + URL_1922, tileSize: 256 }
                },
                layers: [
                    { id: "osm-layer", type: "raster", source: "osm" },
                    { id: "m1885-layer", type: "raster", source: "m1885", paint: { "raster-opacity": 1 } },
                    { id: "t1922-layer", type: "raster", source: "t1922", paint: { "raster-opacity": 0 } }
                ]
            },
            center: [135.816, 34.992],
            zoom: 14
        });

        map.on('load', () => {
            archiveData.forEach(item => {
                if (item.coords && item.coords.includes(',')) {
                    const [lat, lng] = item.coords.split(',').map(n => parseFloat(n.trim()));
                    const el = document.createElement('div');
                    el.style.color = 'var(--accent)';
                    el.innerHTML = '<i class="fa-solid fa-camera" style="font-size:24px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); cursor:pointer;"></i>';
                    new maplibregl.Marker(el).setLngLat([lng, lat]).setPopup(new maplibregl.Popup({offset:25}).setHTML(`<b>${item.title}</b>`)).addTo(map);
                }
            });
        });

        document.getElementById('time-slider').oninput = (e) => {
            if (!map.isStyleLoaded()) return;
            const val = e.target.value;
            const display = document.getElementById('year-display');
            map.setPaintProperty('m1885-layer', 'raster-opacity', val == 0 ? 1 : 0);
            map.setPaintProperty('t1922-layer', 'raster-opacity', val == 1 ? 1 : 0);
            display.innerText = val == 0 ? "明治18年 (1885)" : val == 1 ? "大正11年 (1922)" : "現代 (OpenStreetMap)";
        };
    }
</script>
</body>
</html>
