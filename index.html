<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山科歴史アーカイブ</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"></script>
    <style>
        body { margin: 0; background: #f8f5f0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; text-align: center; width: 300px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="ui">
        <b id="year-label">明治18年 (1885)</b><br>
        <input type="range" id="slider" min="0" max="2" step="1" value="0" style="width:100%;">
    </div>

<script>
    // 【最重要：jsDelivr を通して Release の本物データを取得】
    const URL_1885 = "https://cdn.jsdelivr.net/gh/ziguti/yamashina-map@data/1885.pmtiles";
    const URL_1922 = "https://cdn.jsdelivr.net/gh/ziguti/yamashina-map@data/1922.pmtiles";

    let protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                "osm": { type: "raster", tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"], tileSize: 256 },
                "m1885": { type: "raster", url: "pmtiles://" + URL_1885, tileSize: 256 },
                "t1922": { type: "raster", url: "pmtiles://" + URL_1922, tileSize: 256 }
            },
            layers: [
                { id: "osm-layer", type: "raster", source: "osm" },
                { id: "m1885-layer", type: "raster", source: "m1885", paint: { "raster-opacity": 1 } },
                { id: "t1922-layer", type: "raster", source: "t1922", paint: { "raster-opacity": 0 } }
            ]
        },
        center: [135.816, 34.992],
        zoom: 14
    });

    document.getElementById('slider').oninput = (e) => {
        const val = e.target.value;
        map.setPaintProperty('m1885-layer', 'raster-opacity', val == 0 ? 1 : 0);
        map.setPaintProperty('t1922-layer', 'raster-opacity', val == 1 ? 1 : 0);
        document.getElementById('year-label').innerText = 
            val == 0 ? "明治18年 (1885)" : val == 1 ? "大正11年 (1922)" : "現代";
    };
</script>
</body>
</html>
