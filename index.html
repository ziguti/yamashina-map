<!DOCTYPE html>
<html>
<head>
    <title>山科アーカイブ（1885/1922）</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .menu { position: absolute; top: 10px; left: 10px; background: white; padding: 10px; border-radius: 5px; z-index: 1000; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="menu">
    <strong>山科郷土史アーカイブ</strong><br>
    <input type="radio" name="layer" value="1885" checked onclick="switchMap('1885')"> 明治18年(1885)<br>
    <input type="radio" name="layer" value="1922" onclick="switchMap('1922')"> 大正11年(1922)
</div>
<div id="map"></div>

<script>
    let protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                "historic_map": {
                    type: "raster",
                    url: "pmtiles://1885.pmtiles", // 拡張子s付きを確認！
                    tileSize: 256
                }
            },
            layers: [{
                id: "historic_layer",
                type: "raster",
                source: "historic_map"
            }]
        },
        center: [135.816, 34.992],
        zoom: 14
    });

    function switchMap(year) {
        const url = `pmtiles://${year}.pmtiles`;
        map.getSource('historic_map').setUrl(url);
    }

    map.addControl(new maplibregl.NavigationControl());
</script>
</body>
</html>
