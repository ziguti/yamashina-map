<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow"> 
    <title>山科歴史デジタルアーカイブ | 内部資料</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
        :root {
            --font-serif: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "MS PMincho", serif;
            --primary-brown: #4e342e;
            --accent-gold: #bda06d;
            --bg-cream: #fdfaf2;
            --header-height: 70px;
        }

        body, html { margin: 0; padding: 0; background-color: var(--bg-cream); font-family: var(--font-serif); color: #333; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- ヘッダー --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 2000; box-sizing: border-box;
        }
        .logo-group { display: flex; flex-direction: column; }
        .header-logo { font-size: 1.1rem; font-weight: bold; color: var(--primary-brown); text-decoration: none; letter-spacing: 0.1rem; }
        .header-sub-logo { font-size: 0.6rem; color: var(--primary-brown); opacity: 0.8; }
        .header-nav a { margin-left: 15px; text-decoration: none; color: #444; font-size: 1.2rem; }

        .page { display: none; min-height: 100vh; box-sizing: border-box; }
        .page-content { padding-top: var(--header-height); }

        /* --- HOME --- */
        .hero { position: relative; width: 100%; height: 60vh; background: #000; display: flex; align-items: center; justify-content: center; }
        .hero-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hero-title { position: relative; color: #fff; font-size: 2.5rem; letter-spacing: 0.5rem; text-align: center; z-index: 10; padding: 0 20px; }

        .nav-container { display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: -50px auto 50px; padding: 0 20px; position: relative; z-index: 100; }
        .nav-card { position: relative; width: 100%; height: 200px; background: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-decoration: none; display: block; }
        .nav-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; opacity: 0.7; }
        .nav-card:hover img { transform: scale(1.03); opacity: 0.5; }
        .nav-card-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; }
        .nav-card-title { font-size: 1.8rem; font-weight: bold; }

        /* --- ARCHIVE LIST --- */
        .archive-controls { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .search-input { width: 100%; padding: 12px; border: none; border-bottom: 2px solid var(--primary-brown); background: transparent; font-family: var(--font-serif); font-size: 1rem; box-sizing: border-box; }
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px; }
        .archive-item { background: #fff; padding: 10px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
        .archive-item img { width: 100%; height: 200px; object-fit: cover; border-radius: 2px; }

        /* --- MAP --- */
        #map { width: 100%; height: calc(100vh - var(--header-height)); margin-top: var(--header-height); }
        .map-overlay { position: absolute; bottom: 30px; left: 15px; right: 15px; z-index: 1000; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); text-align: center; }
        
        /* ポップアップ */
        .popup-card { width: 200px; font-family: var(--font-serif); }
        .popup-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; }
        .popup-link { display: inline-block; background: var(--accent-gold); color: white; padding: 5px 10px; border-radius: 12px; text-decoration: none; font-size: 0.8rem; margin-top: 5px; }

        .camera-pin { background: var(--primary-brown); color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; cursor: pointer; }

        #lock-screen { position: fixed; inset: 0; background: var(--bg-cream); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="lock-screen">
    <i class="fa-solid fa-lock" style="font-size: 3rem; color: var(--primary-brown); margin-bottom: 20px;"></i>
    <h2>関係者専用アーカイブ</h2>
    <p>この先の閲覧には合言葉が必要です。</p>
    <button onclick="promptPassword()" style="padding: 10px 30px; background: var(--primary-brown); color: white; border: none; border-radius: 5px; cursor: pointer;">パスワードを入力</button>
</div>

<header id="main-header" style="display:none;">
    <div class="logo-group">
        <a href="javascript:showPage('home')" class="header-logo">山科歴史アーカイブ</a>
        <span class="header-sub-logo">INTERNAL USE ONLY</span>
    </div>
    <nav class="header-nav">
        <a href="javascript:showPage('archive')"><i class="fa-solid fa-box-archive"></i></a>
        <a href="javascript:showPage('map')"><i class="fa-solid fa-map-location-dot"></i></a>
    </nav>
</header>

<div id="home-page" class="page">
    <section class="hero">
        <img src="1885.png" class="hero-img"> <h1 class="hero-title">山科の記憶</h1>
    </section>
    <div class="nav-container">
        <a href="javascript:showPage('archive')" class="nav-card">
            <div class="nav-card-overlay"><div class="nav-card-title">古写真検索</div></div>
        </a>
        <a href="javascript:showPage('map')" class="nav-card">
            <div class="nav-card-overlay"><div class="nav-card-title">歴史マップ</div></div>
        </a>
    </div>
</div>

<div id="archive-page" class="page page-content">
    <div class="archive-controls">
        <input type="text" id="search-input" class="search-input" placeholder="キーワード検索..." oninput="filterData()">
    </div>
    <div id="archive-list" class="archive-grid"></div>
</div>

<div id="detail-page" class="page page-content">
    <div id="detail-content" style="padding: 20px; max-width: 800px; margin: auto;"></div>
    <center><a href="javascript:showPage('archive')" class="back-btn" style="background:var(--primary-brown); color:white; padding:10px 20px; text-decoration:none; border-radius:20px;">一覧に戻る</a></center>
</div>

<div id="map-page" class="page">
    <div id="map"></div>
    <div class="map-overlay">
        <span id="year-display" style="font-weight:bold; color:var(--primary-brown);">明治18年 (1885)</span><br>
        <input type="range" id="time-slider" min="0" max="2" step="1" value="0" style="width:80%;">
        <div style="display:flex; justify-content:space-between; font-size:0.7rem; padding:0 10%;">
            <span>1885</span><span>1922</span><span>現代</span>
        </div>
    </div>
</div>

<script>
    const SECRET_PASSWORD = "yamashina_rekishi"; 
    const SHEET_ID = '1JNOhsD4k1GzEVnUqS2ftN8ytw2GbraXjEFysoxwVl_A';
    let archiveData = [];
    let map;

    // PMTilesプロトコルの設定
    let protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    function promptPassword() {
        const pass = prompt("合言葉を入力してください");
        if (pass === SECRET_PASSWORD) {
            localStorage.setItem("yamashina_auth_v1", "true");
            location.reload();
        }
    }

    window.onload = function() {
        if (localStorage.getItem("yamashina_auth_v1") === "true") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            initApp();
        }
    };

    async function initApp() {
        await loadData();
        showPage('home');
        initMap();
    }

    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            archiveData = rows.map((row, index) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                return {
                    id: index,
                    drive_id: cols[1],
                    title: (cols[4]||"名称未設定"),
                    coords: cols[6],
                    year: cols[7] || "年代不明",
                    desc: cols[9] || ""
                };
            }).filter(d => d.drive_id);
            renderArchive(archiveData);
        } catch (e) { console.error(e); }
    }

    function showPage(pageId, recordId = null) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId + '-page').style.display = 'block';
        if(pageId === 'map' && map) setTimeout(() => map.resize(), 200);
        if(pageId === 'detail') renderDetail(recordId);
    }

    function renderArchive(data) {
        document.getElementById('archive-list').innerHTML = data.map(item => `
            <div class="archive-item" onclick="showPage('detail', ${item.id})">
                <img src="https://drive.google.com/thumbnail?id=${item.drive_id}&sz=w600">
                <h4>${item.title}</h4>
                <div style="font-size:0.75rem;">${item.year}</div>
            </div>
        `).join('');
    }

    function renderDetail(id) {
        const item = archiveData.find(d => d.id === id);
        document.getElementById('detail-content').innerHTML = `
            <img src="https://drive.google.com/thumbnail?id=${item.drive_id}&sz=w1200" style="width:100%; border-radius:8px;">
            <h2>${item.title}</h2>
            <p>${item.desc}</p>
        `;
    }

    // --- マップ機能 (MapLibre + PMTiles) ---
    function initMap() {
        map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    "osm": { type: "raster", tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"], tileSize: 256 },
                    "historic": { type: "raster", url: "pmtiles://1885.pmtiles", tileSize: 256 }
                },
                layers: [
                    { id: "osm-layer", type: "raster", source: "osm" },
                    { id: "historic-layer", type: "raster", source: "historic", paint: { "raster-opacity": 1 } }
                ]
            },
            center: [135.816, 34.992],
            zoom: 14
        });

        // 年代切り替えスライダー
        document.getElementById('time-slider').oninput = (e) => {
            const val = e.target.value;
            const display = document.getElementById('year-display');
            if (val == 0) {
                display.innerText = "明治18年 (1885)";
                map.getSource('historic').setUrl("pmtiles://1885.pmtiles");
                map.setPaintProperty('historic-layer', 'raster-opacity', 1);
            } else if (val == 1) {
                display.innerText = "大正11年 (1922)";
                map.getSource('historic').setUrl("pmtiles://1922.pmtiles");
                map.setPaintProperty('historic-layer', 'raster-opacity', 1);
            } else {
                display.innerText = "現代 (OSM)";
                map.setPaintProperty('historic-layer', 'raster-opacity', 0);
            }
        };

        // ピン（カメラ）の描画
        archiveData.forEach(item => {
            if (item.coords && item.coords.includes(',')) {
                const [lat, lng] = item.coords.split(',').map(n => parseFloat(n.trim()));
                const el = document.createElement('div');
                el.className = 'camera-pin';
                el.innerHTML = '<i class="fa-solid fa-camera"></i>';
                el.onclick = () => {
                    new maplibregl.Popup()
                        .setLngLat([lng, lat])
                        .setHTML(`<div class="popup-card"><img src="https://drive.google.com/thumbnail?id=${item.drive_id}&sz=w400"><br><b>${item.title}</b><br><a href="javascript:showPage('detail', ${item.id})" class="popup-link">詳細</a></div>`)
                        .addTo(map);
                };
                new maplibregl.Marker(el).setLngLat([lng, lat]).addTo(map);
            }
        });
    }

    function filterData() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const filtered = archiveData.filter(d => d.title.toLowerCase().includes(q));
        renderArchive(filtered);
    }
</script>
</body>
</html>
