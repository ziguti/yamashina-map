<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山科歴史デジタルアーカイブ</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #8b0000; --bg: #f8f5f0; --text: #2c2c2c; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Shippori Mincho', serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* ヘッダー */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 5000; border-bottom: 1px solid rgba(0,0,0,0.1); box-sizing: border-box; }
        
        .page { display: none; width: 100%; min-height: 100vh; padding-top: 60px; box-sizing: border-box; }
        .active { display: block; }

        /* ヒーローセクション */
        .hero { padding: 80px 20px; text-align: center; background: white; border-bottom: 1px solid #eee; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; letter-spacing: 0.2rem; }
        
        /* ナビボタン */
        .nav-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .nav-btn { padding: 15px 30px; border-radius: 50px; border: none; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .nav-btn.primary { background: var(--accent); color: white; }

        /* 地図エリア */
        #map { width: 100%; height: calc(100vh - 60px); }

        /* 検索・フィルタ */
        .search-bar { padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; background: white; position: sticky; top: 60px; z-index: 100; border-bottom: 1px solid #eee; }
        .search-bar input { padding: 10px 20px; border-radius: 25px; border: 1px solid #ddd; width: 300px; font-family: inherit; }
        .filter-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.85rem; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* アーカイブカード */
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-tag { font-size: 0.7rem; background: #f0f0f0; padding: 3px 8px; border-radius: 4px; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; color:var(--accent); cursor:pointer;" onclick="showPage('home')">山科歴史アーカイブ</div>
    <nav style="font-size: 1.2rem;">
        <i class="fa-solid fa-house" onclick="showPage('home')" style="cursor:pointer; margin-right:20px;"></i>
        <i class="fa-solid fa-map-location-dot" onclick="showPage('map')" style="cursor:pointer; margin-right:20px;"></i>
        <i class="fa-solid fa-box-archive" onclick="showPage('archive')" style="cursor:pointer;"></i>
    </nav>
</header>

<div id="home-page" class="page active">
    <section class="hero">
        <h1>温故知新</h1>
        <p>山科の記憶を次世代へつなぐデジタルアーカイブ</p>
        <div class="nav-container">
            <button class="nav-btn primary" onclick="showPage('map')">
                <i class="fa-solid fa-map"></i> 歴史地図を見る
            </button>
            <button class="nav-btn" onclick="showPage('archive')">
                <i class="fa-solid fa-images"></i> 古写真を探す
            </button>
        </div>
    </section>
</div>

<div id="map-page" class="page">
    <div id="map"></div>
</div>

<div id="archive-page" class="page">
    <div class="search-bar">
        <input type="text" id="keyword-search" placeholder="キーワードで検索（例：毘沙門堂）..." oninput="filterArchive()">
        <div id="filter-container">
            <button class="filter-btn active" onclick="setYearFilter('すべて', this)">すべて</button>
            <button class="filter-btn" onclick="setYearFilter('明治', this)">明治</button>
            <button class="filter-btn" onclick="setYearFilter('大正', this)">大正</button>
            <button class="filter-btn" onclick="setYearFilter('昭和', this)">昭和</button>
        </div>
    </div>
    <div id="archive-list" class="archive-grid"></div>
</div>

<script>
    const SHEET_ID = '1JNOhsD4k1GzEVnUqS2ftN8ytw2GbraXjEFysoxwVl_A';
    let archiveData = [];
    let currentYearFilter = 'すべて';
    let map;

    async function initApp() {
        await loadSpreadsheet();
        initMap();
    }

    async function loadSpreadsheet() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            archiveData = rows.map((row, idx) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^\" ]*$)/).map(c => c.replace(/"/g, '').trim());
                return {
                    id: idx,
                    drive_id: cols[1],
                    title: cols[4] || '無題',
                    description: cols[5] || '',
                    coords: cols[6],
                    year: cols[7] || '不明',
                    era: getEra(cols[7])
                };
            }).filter(d => d.drive_id);
            renderArchive(archiveData);
        } catch (e) { console.error("データ読み込み失敗:", e); }
    }

    function getEra(yearStr) {
        if (!yearStr) return '不明';
        if (yearStr.includes('明治')) return '明治';
        if (yearStr.includes('大正')) return '大正';
        if (yearStr.includes('昭和')) return '昭和';
        return 'その他';
    }

    function renderArchive(data) {
        const list = document.getElementById('archive-list');
        list.innerHTML = data.map(item => `
            <a href="https://drive.google.com/file/d/${item.drive_id}/view?usp=sharing" target="_blank" class="card">
                <img src="https://drive.google.com/thumbnail?id=${item.drive_id}&sz=w600" alt="${item.title}" loading="lazy">
                <div class="card-body">
                    <span class="card-tag">${item.year}</span>
                    <h3 style="margin:5px 0; font-size:1.1rem;">${item.title}</h3>
                    <p style="font-size:0.8rem; color:#666; height:3em; overflow:hidden;">${item.description}</p>
                </div>
            </a>
        `).join('');
    }

    function filterArchive() {
        const keyword = document.getElementById('keyword-search').value.toLowerCase();
        const filtered = archiveData.filter(item => {
            const matchKeyword = item.title.toLowerCase().includes(keyword) || item.description.toLowerCase().includes(keyword);
            const matchYear = currentYearFilter === 'すべて' || item.era === currentYearFilter;
            return matchKeyword && matchYear;
        });
        renderArchive(filtered);
    }

    function setYearFilter(era, btn) {
        currentYearFilter = era;
        document.querySelectorAll('.filter-btn').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        filterArchive();
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById(p + '-page').classList.add('active');
        if(p === 'map' && map) setTimeout(() => map.resize(), 300);
        window.scrollTo(0, 0);
    }

    function initMap() {
        map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    "osm": { type: "raster", tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"], tileSize: 256, attribution: "OSM" },
                    // 国土地理院 1945年～1950年のタイル
                    "gsi_1946": { 
                        type: "raster", 
                        tiles: ["https://cyberjapandata.gsi.go.jp/xyz/ort_usa10/{z}/{x}/{y}.jpg"], 
                        tileSize: 256, 
                        attribution: "地理院地図 (1945-1950)" 
                    }
                },
                layers: [
                    { id: "osm-layer", type: "raster", source: "osm" },
                    { id: "gsi-layer", type: "raster", source: "gsi_1946", paint: { "raster-opacity": 0.8 } }
                ]
            },
            center: [135.816, 34.992],
            zoom: 14
        });

        // ピン（マーカー）の設置
        map.on('load', () => {
            archiveData.forEach(item => {
                if (item.coords && item.coords.includes(',')) {
                    const [lat, lng] = item.coords.split(',').map(n => parseFloat(n.trim()));
                    const el = document.createElement('div');
                    el.className = 'marker';
                    el.innerHTML = `<div style="background:var(--accent); color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.3); cursor:pointer;"><i class="fa-solid fa-camera" style="font-size:14px;"></i></div>`;
                    
                    new maplibregl.Marker(el)
                        .setLngLat([lng, lat])
                        .setPopup(new maplibregl.Popup({offset:25}).setHTML(`
                            <div style="text-align:center; font-family:'Shippori Mincho', serif;">
                                <img src="https://drive.google.com/thumbnail?id=${item.drive_id}&sz=w200" style="width:100%; border-radius:5px;">
                                <p><b>${item.title}</b></p>
                                <button onclick="window.open('https://drive.google.com/file/d/${item.drive_id}/view?usp=sharing')" style="background:#222; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer; font-size:0.7rem;">詳細を見る</button>
                            </div>
                        `))
                        .addTo(map);
                }
            });
        });
    }

    window.onload = initApp;
</script>
</body>
</html>
