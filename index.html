<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow"> <title>山科歴史デジタルアーカイブ | 内部資料</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --font-serif: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "MS PMincho", serif;
            --primary-brown: #4e342e;
            --accent-gold: #bda06d;
            --bg-cream: #fdfaf2;
            --header-height: 70px;
        }

        body, html { margin: 0; padding: 0; background-color: var(--bg-cream); font-family: var(--font-serif); color: #333; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- ヘッダー（スマホ対応） --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 2000; box-sizing: border-box;
        }
        .logo-group { display: flex; flex-direction: column; }
        .header-logo { font-size: 1.1rem; font-weight: bold; color: var(--primary-brown); text-decoration: none; letter-spacing: 0.1rem; }
        .header-sub-logo { font-size: 0.6rem; color: var(--primary-brown); opacity: 0.8; }
        .header-nav a { margin-left: 15px; text-decoration: none; color: #444; font-size: 0.85rem; font-weight: 600; }

        .page { display: none; min-height: 100vh; box-sizing: border-box; }
        .page-content { padding-top: var(--header-height); }

        /* --- HOME --- */
        .hero { position: relative; width: 100%; height: 60vh; background: #000; display: flex; align-items: center; justify-content: center; }
        .hero-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hero-title { position: relative; color: #fff; font-size: 2.5rem; letter-spacing: 0.5rem; text-align: center; z-index: 10; padding: 0 20px; }

        .nav-container { display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: -50px auto 50px; padding: 0 20px; position: relative; z-index: 100; }
        .nav-card { position: relative; width: 100%; height: 250px; background: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-decoration: none; display: block; }
        .nav-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; opacity: 0.7; }
        .nav-card:hover img { transform: scale(1.03); opacity: 0.5; }
        .nav-card-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; }
        .nav-card-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 8px; }

        /* --- ARCHIVE LIST --- */
        .archive-controls { max-width: 800px; margin: 30px auto; display: flex; flex-direction: column; gap: 15px; padding: 0 20px; }
        .search-input { width: 100%; padding: 12px; border: none; border-bottom: 2px solid var(--primary-brown); background: transparent; font-family: var(--font-serif); font-size: 1rem; box-sizing: border-box; }
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px; }
        .archive-item { background: #fff; padding: 10px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
        .archive-item img { width: 100%; height: 200px; object-fit: cover; border-radius: 2px; }

        /* --- DETAIL PAGE --- */
        .detail-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .detail-image img { width: 100%; border-radius: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .info-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
        .info-table th, .info-table td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        .info-table th { width: 100px; color: #888; font-weight: normal; background: #fafafa; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 12px 30px; background: var(--primary-brown); color: #fff; text-decoration: none; border-radius: 30px; }

        /* --- MAP --- */
        #map { width: 100%; height: calc(100vh - var(--header-height)); }
        .map-overlay { position: absolute; bottom: 30px; left: 15px; right: 15px; z-index: 1000; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }

        /* ポップアップアニメーション */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .popup-card img { width: 100%; height: 120px; object-fit: cover; }
        .popup-body { padding: 10px; text-align: center; }
        .popup-link { display: inline-block; background: var(--accent-gold); color: #fff; padding: 5px 15px; border-radius: 15px; text-decoration: none; font-size: 0.8rem; margin-top: 5px; }

        .camera-pin { background: var(--primary-brown); color: #fff; width: 34px!important; height: 34px!important; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }

        /* 認証用隠し画面 */
        #lock-screen { position: fixed; inset: 0; background: var(--bg-cream); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="lock-screen">
    <i class="fa-solid fa-lock" style="font-size: 3rem; color: var(--primary-brown); margin-bottom: 20px;"></i>
    <h2>関係者専用アーカイブ</h2>
    <p>この先の閲覧には合言葉が必要です。<br><small>（外部へのURL共有・転載厳禁）</small></p>
    <button onclick="promptPassword()" style="padding: 10px 30px; background: var(--primary-brown); color: white; border: none; border-radius: 5px; cursor: pointer; font-family: var(--font-serif);">パスワードを入力</button>
</div>

<header id="main-header" style="display:none;">
    <div class="logo-group">
        <a href="javascript:showPage('home')" class="header-logo">山科歴史アーカイブ</a>
        <span class="header-sub-logo">INTERNAL USE ONLY</span>
    </div>
    <nav class="header-nav">
        <a href="javascript:showPage('archive')"><i class="fa-solid fa-box-archive"></i></a>
        <a href="javascript:showPage('map')"><i class="fa-solid fa-map-location-dot"></i></a>
    </nav>
</header>

<div id="home-page" class="page">
    <section class="hero">
        <img src="IMG_20250907_083738.jpg" class="hero-img">
        <h1 class="hero-title">山科の記憶</h1>
    </section>
    <div class="nav-container">
        <a href="javascript:showPage('archive')" class="nav-card">
            <img src="IMG_20250426_140907.jpg">
            <div class="nav-card-overlay"><div class="nav-card-title">古写真検索</div></div>
        </a>
        <a href="javascript:showPage('map')" class="nav-card">
            <img src="190400-0007.jpg">
            <div class="nav-card-overlay"><div class="nav-card-title">比較マップ</div></div>
        </a>
    </div>
</div>

<div id="archive-page" class="page page-content">
    <div class="archive-controls">
        <input type="text" id="search-input" class="search-input" placeholder="キーワードで史料を探す..." oninput="filterData()">
    </div>
    <div id="archive-list" class="archive-grid"></div>
</div>

<div id="detail-page" class="page page-content">
    <div id="detail-content" class="detail-container"></div>
</div>

<div id="map-page" class="page">
    <div style="position:relative;">
        <div id="map"></div>
        <div class="map-overlay">
            <span style="font-size:0.7rem; color:#666;">空中写真 透過度</span>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="0.7" style="width:100%;">
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const SECRET_PASSWORD = "yamashina_rekishi"; // ← 会の人に教えるパスワード
    const SHEET_ID = '1JNOhsD4k1GzEVnUqS2ftN8ytw2GbraXjEFysoxwVl_A';
    let archiveData = [];
    let map, historicalLayer;

    // 1. パスワード認証（ブラウザに一時保存）
    function promptPassword() {
        const pass = prompt("合言葉を入力してください");
        if (pass === SECRET_PASSWORD) {
            localStorage.setItem("yamashina_auth_v1", "true");
            location.reload();
        } else if (pass !== null) {
            alert("合言葉が正しくありません");
        }
    }

    window.onload = function() {
        if (localStorage.getItem("yamashina_auth_v1") === "true") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            initApp();
        }
    };

    // 2. メイン初期化
    async function initApp() {
        await loadData();
        showPage('home');
    }

    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            archiveData = rows.map((row, index) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                return {
                    id: index,
                    drive_id: cols[1],
                    title: (cols[4]||"名称未設定").replace(/\.[^/.]+$/, ""),
                    coords: cols[6],
                    year: cols[7] || "年代不明",
                    author: cols[8] || "不明",
                    desc: cols[9] || "",
                    location: cols[10] || "山科区内",
                    copyright: cols[11] || "山科を語り継ぐ会"
                };
            }).filter(d => d.drive_id);
            renderArchive(archiveData);
            initMap();
        } catch (e) { alert("データ読み込みに失敗しました。ネット環境を確認してください。"); }
    }

    // 3. ページ切り替え
    function showPage(pageId, recordId = null) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId + '-page').style.display = 'block';
        window.scrollTo(0,0);
        if(pageId === 'map') {
            setTimeout(() => map.invalidateSize(), 200);
            renderMarkers(archiveData);
        }
        if(pageId === 'detail' && recordId !== null) renderDetail(recordId);
    }

    // 4. 一覧描画
    function renderArchive(data) {
        const list = document.getElementById('archive-list');
        list.innerHTML = data.map(item => `
            <div class="archive-item" onclick="showPage('detail', ${item.id})">
                <img src="https://drive.google.com/thumbnail?id=${item.drive_id}&sz=w600" loading="lazy">
                <h4 style="margin:10px 0 5px;">${item.title}</h4>
                <div style="font-size:0.75rem; color:#888;">${item.year}</div>
            </div>
        `).join('');
    }

    // 5. 詳細描画
    function renderDetail(id) {
        const item = archiveData.find(d => d.id === id);
        const container = document.getElementById('detail-content');
        container.innerHTML = `
            <div class="detail-image"><img src="https://drive.google.com/thumbnail?id=${item.drive_id}&sz=w1200"></div>
            <div class="detail-info">
                <h2 style="margin-bottom:10px;">${item.title}</h2>
                <table class="info-table">
                    <tr><th>年代</th><td>${item.year}</td></tr>
                    <tr><th>撮影者</th><td>${item.author}</td></tr>
                    <tr><th>場所</th><td>${item.location}</td></tr>
                    <tr><th>解説</th><td>${item.desc}</td></tr>
                    <tr><th>権利</th><td>${item.copyright}</td></tr>
                </table>
                <a href="javascript:showPage('archive')" class="back-btn">一覧に戻る</a>
            </div>
        `;
    }

    // 6. マップ機能
    function initMap() {
        map = L.map('map').setView([34.992, 135.813], 15);
        L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { subdomains: ['mt0','mt1','mt2','mt3'] }).addTo(map);
        historicalLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/ort_USA10/{z}/{x}/{y}.png', { opacity: 0.7 }).addTo(map);
        document.getElementById('opacity-slider').oninput = (e) => historicalLayer.setOpacity(e.target.value);
    }

    function renderMarkers(data) {
        data.forEach(item => {
            if (item.coords && item.coords.includes(',')) {
                const [lat, lng] = item.coords.split(',').map(n => parseFloat(n.trim()));
                if (!isNaN(lat)) {
                    const icon = L.divIcon({ className: 'custom', html: `<div class="camera-pin"><i class="fa-solid fa-camera"></i></div>`, iconSize:[34,34], iconAnchor:[17,17] });
                    const popupContent = `
                        <div class="popup-card">
                            <img src="https://drive.google.com/thumbnail?id=${item.drive_id}&sz=w400">
                            <div class="popup-body">
                                <div style="font-weight:bold; font-size:0.9rem;">${item.title}</div>
                                <a href="javascript:showPage('detail', ${item.id})" class="popup-link">詳細を見る</a>
                            </div>
                        </div>
                    `;
                    L.marker([lat, lng], { icon }).addTo(map).bindPopup(popupContent);
                }
            }
        });
    }

    function filterData() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const filtered = archiveData.filter(d => d.title.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q) || d.location.toLowerCase().includes(q));
        renderArchive(filtered);
    }
</script>
</body>
</html>
